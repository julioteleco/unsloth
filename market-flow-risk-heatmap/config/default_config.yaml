# Default configuration for market-flow-risk-heatmap (Phase 0)
# Paths are resolved relative to the project root unless absolute.

universe:
  # Core tradable / context ETFs and the VIX index.
  tickers:
    - SPY
    - QQQ
    - IWM
    - DIA
    - RSP
    - SMH
    - XLK
    - XLF
    - XLE
    - HYG
    - TLT
    - UUP
    - GLD
    - USO
    - "^VIX"
  # Full sector set (free via yfinance) for sector-rotation breadth.
  sectors:
    - XLY   # consumer discretionary (cyclical)
    - XLP   # consumer staples (defensive)
    - XLV   # health care
    - XLI   # industrials
    - XLU   # utilities (defensive)
    - XLB   # materials
    - XLRE  # real estate
    - XLC   # communication services
  # VIX term-structure / vol-of-vol indices (free via yfinance).
  vol_indices:
    - "^VIX9D"
    - "^VIX3M"
    - "^VVIX"
  # Extra risk-appetite context (free via yfinance).
  extra_context:
    - "BTC-USD"   # 24/7 risk-appetite proxy
  # Optional futures used ONLY as context (never as the primary instrument).
  futures_context:
    - "ES=F"
    - "NQ=F"
    - "YM=F"
    - "RTY=F"
  # Tickers the dashboard exposes as primary instruments.
  primary_tickers:
    - SPY
    - QQQ
    - IWM
    - DIA
  # Tickers for which we attempt an options snapshot.
  options_tickers:
    - SPY
    - QQQ

download:
  period: "60d"
  interval: "5m"
  daily_period: "2y"
  daily_interval: "1d"
  cache_ttl_minutes: 30

fred:
  series:
    # Rates / curve
    - DGS10        # 10Y Treasury
    - DGS2         # 2Y Treasury
    - DGS3MO       # 3M T-bill (for 10y-3m recession spread)
    - DFF          # effective fed funds rate
    - T10YIE       # 10Y breakeven inflation
    # Volatility / dollar
    - VIXCLS       # VIX daily close (FRED cross-check)
    - DTWEXBGS     # broad US dollar index
    # Credit spreads (best free stress gauges)
    - BAMLH0A0HYM2 # ICE BofA US High Yield OAS
    - BAMLC0A0CM   # ICE BofA US Corporate (IG) OAS
    # Financial conditions / liquidity
    - NFCI         # Chicago Fed National Financial Conditions Index
    - ANFCI        # adjusted NFCI
    - WALCL        # Fed total assets (balance sheet)
    - RRPONTSYD    # overnight reverse repo (liquidity drain)
  # FRED_API_KEY is read from the environment (.env). It is OPTIONAL.

features:
  vwap:
    # Distance normalisation uses the intraday ATR.
    atr_window: 14
    # Volume-weighted standard-deviation bands around session VWAP.
    band_sigmas: [1.0, 2.0]
  atr:
    window: 14
    # 'wilder' (RMA, the classic Wilder ATR) or 'sma' (simple rolling mean).
    method: "wilder"
  rvol:
    lookback_days: 20
    # Winsorize RVOL at this upper cap to tame data-glitch spikes.
    clip_max: 10.0
  volume_profile:
    bins: 80
    value_area_pct: 0.70
    hvn_quantile: 0.80   # bins above this share of POC volume are HVN
    lvn_quantile: 0.20   # bins below this share of POC volume are LVN
  breadth:
    # Numerator/denominator pairs for relative-strength ratios.
    ratios:
      - ["RSP", "SPY"]    # equal- vs cap-weight (breadth quality)
      - ["SMH", "QQQ"]    # semis leadership
      - ["IWM", "SPY"]    # small-cap risk appetite
      - ["HYG", "TLT"]    # credit risk appetite
      - ["XLK", "SPY"]    # tech leadership
      - ["XLF", "SPY"]    # financials leadership
      - ["XLY", "XLP"]    # cyclical vs defensive (classic risk-on/off)
      - ["XLI", "XLU"]    # industrials vs utilities (cyclical vs defensive)
    return_windows: [1, 3, 12]
  regime:
    vix_ma_short: 5
    vix_ma_long: 20
    # VIX term-structure ratio (VIX/VIX3M): >1 = backwardation = stress.
    vix_backwardation_threshold: 1.0
  seasonality:
    # Optional known event dates (YYYY-MM-DD). Empty by default to avoid stale
    # data; fill with FOMC / CPI / NFP dates if you want event-day flags.
    fomc_dates: []
    cpi_dates: []
    # Minutes-before-close considered the "closing auction window".
    closing_window_min: 30

scoring:
  # Threshold cut points for converting a 0-100 score into a label.
  labels:
    bajo: 25
    medio: 50
    alto: 75
    # >= alto -> "extremo" handled in code

labeling:
  triple_barrier:
    upper_atr: 0.8
    lower_atr: 0.5
    horizon_bars: 12
  backtest_buckets: [0, 20, 40, 60, 80, 100]

paths:
  data_dir: "data"
  raw: "data/raw"
  processed: "data/processed"
  features: "data/features"
  options_snapshots: "data/options_snapshots"
