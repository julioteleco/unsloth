name: agent_platform CI

on:
  push:
    paths:
      - "agent_platform/**"
      - ".github/workflows/agent_platform-ci.yml"
  pull_request:
    paths:
      - "agent_platform/**"
      - ".github/workflows/agent_platform-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent_platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests examples
      - name: Mypy (--strict)
        run: |
          mypy
          mypy --strict tests examples
      - name: Pytest
        run: pytest -q
